<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHM 101 PRACTICE TEST</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}


body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
  background: #000; /* fallback */
  overflow:hidden;
}

/* Fullscreen background layers */
.bg,
.bg::after{
  position: fixed;
  inset: 0;
  z-index: -2;
}

.bg{
  background-size: cover;
  background-position: center;
  transition: opacity 1.5s ease, transform 2s ease;
  opacity: 0;
  transform: scale(1.05);
}

/* Dark overlay like Canva black rectangle */
.bg::after{
  content:"";
  background: rgba(0,0,0,0.6);
  z-index: -1;
}



.app{
  width:100%;max-width:560px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:18px;
  color:white;
  box-shadow:0 15px 35px rgba(0,0,0,0.6);
}
.header{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
}
.calc-btn{
  background:#ffb703;border:none;padding:6px 10px;border-radius:20px;font-weight:bold;cursor:pointer;
}
.timer{
  background:#00c6ff;color:black;padding:6px 12px;border-radius:20px;font-weight:bold;
}
.timer.yellow{background:#ffd60a;animation:blink 0.5s 3;}
.timer.red{background:#ff3b3b;color:white;animation:blink 0.5s infinite;}
@keyframes blink{50%{opacity:0.3}}

.card{background:rgba(255,255,255,0.15);padding:15px;border-radius:12px;margin:12px 0;}
.options label{
  display:block;margin:8px 0;padding:10px;border-radius:8px;
  background:rgba(255,255,255,0.1);cursor:pointer;transition:.3s;
}
.options label:hover{background:rgba(255,255,255,0.25);transform:scale(1.02)}
.buttons{display:flex;gap:10px}
button{
  flex:1;border:none;padding:10px;border-radius:20px;font-weight:bold;cursor:pointer;transition:.3s
}
button:disabled{background:#555;color:#aaa;cursor:not-allowed}
#prev{background:#888}
#next{background:#00c6ff;color:black}
#submit{background:#00ff99;color:black}
/* Result container scrollable */
#result {
  max-height: 70vh;          /* Limit height to 70% of viewport */
  overflow-y: auto;          /* Enable vertical scroll */
  padding: 16px;
  scrollbar-width: thin;     /* Firefox scrollbar style */
  scrollbar-color: #00ff99 transparent; /* Firefox scrollbar color */
  margin-top: 12px;          /* Keep your current spacing */
}

/* Chrome, Edge, Safari scrollbar style */
#result::-webkit-scrollbar {
  width: 8px;
}

#result::-webkit-scrollbar-thumb {
  background-color: #00ff99;
  border-radius: 4px;
}

#result::-webkit-scrollbar-track {
  background: transparent;
}
#result {
  max-height: 150vh;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: 450px;   /* ensures Q49 & Q50 are visible */
  margin-top: 12px;
}

/* Keep your current review styling */
.review {
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border-radius: 8px;
  margin: 8px 0;
  border-left: 4px solid #00ff99;
}

.hidden{display:none}
.goto{margin:10px 0;display:flex;gap:6px}
.goto input{flex:1;padding:6px;border-radius:6px;border:none}


.modal{
  position: fixed;
  inset: 0;               /* top:0; right:0; bottom:0; left:0 */
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;          /* ensure it sits on top of everything */
}

.hidden{
  display: none;
}

.modal-content{
  background: #0f2027;
  color: white;
  padding: 15px;
  border-radius: 12px;
  width: 280px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.7);
}


.calc-screen{
  background:#000;
  color:#00ff99;
  font-size:22px;
  padding:10px;
  border-radius:8px;
  text-align:right;
  margin-bottom:10px;
}
.calc-grid{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:8px;
}
.calc-grid button{
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  background:#222;
  color:white;
  transition:0.2s;
}
.calc-grid button:hover{
  background:#00c6ff;
  color:black;
}
.calc-grid .wide{
  grid-column: span 2;
  background:#ffb703;
  color:black;
}
.calc-grid .close{
  background:#ff3b3b;,
  color:white;
}

.modal-content{
  animation: pop 0.2s ease-out;
}
@keyframes pop{
  from{transform: scale(0.85); opacity:0}
  to{transform: scale(1); opacity:1}
}
</style>
</head>

<body>
    
    <!-- Animated background layers -->
<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>


<div class="app">
  <div class="header">
    <h3>CHM 101 PRACTICE TEST</h3>
    <button class="calc-btn" onclick="openCalc()">calc</button>
    <div class="timer" id="timer">17:00</div>
  </div>

  <div class="card">
    <h4 id="qno"></h4>
    <p id="qtext"></p>
    <div class="options">
      <label><input type="radio" name="opt" value="A"> <span id="A"></span></label>
      <label><input type="radio" name="opt" value="B"> <span id="B"></span></label>
      <label><input type="radio" name="opt" value="C"> <span id="C"></span></label>
      <label><input type="radio" name="opt" value="D"> <span id="D"></span></label>
    </div>
  </div>

  <div class="goto">
    <input type="number" id="gotoInput" placeholder="Go to question number">
    <button onclick="goTo()">Go</button>
  </div>

  <div class="buttons">
    <button id="prev">Previous</button>
    <button id="submit">Submit</button>
    <button id="next">Next</button>
  </div>

  <div id="result" class="result hidden"></div>
</div>

<!-- Calculator Modal -->
<div id="calcModal" class="modal hidden">
  <div class="modal-content">
    <h4>Calculator</h4>

    <div class="calc-screen" id="calcScreen">0</div>

    <div class="calc-grid">
      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      <button onclick="press('/')">÷</button>

      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      <button onclick="press('*')">×</button>

      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      <button onclick="press('-')">−</button>

      <button onclick="press('0')">0</button>
      <button onclick="press('.')">.</button>
      <button onclick="calculate()">=</button>
      <button onclick="press('+')">+</button>

      <button class="wide" onclick="clearCalc()">C</button>
      <button class="wide close" onclick="closeCalc()">Close</button>
    </div>
  </div>
</div>
<script>
    
    
    
    
    
    
    /* ===== Load Questions from JSON ===== */
let questions = []; // this is what your existing logic will use

async function loadQuestions(){
  const res = await fetch("questions.json"); // file in same folder as index.html
  const banks = await res.json();

  questions = pickBalanced(banks, 50, 2); // 50 total, at least 2 from each topic

  load();       // your existing function
  startTimer(); // your existing function
}

/* ===== Shuffle & Balanced Picker ===== */
function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function pickBalanced(banksObj, total = 50, minEach = 2){
  let selected = [];
  const allBanks = Object.values(banksObj);

  // guarantee at least 2 from each topic
  allBanks.forEach(bank => {
    const copy = shuffle([...bank]);
    selected.push(...copy.slice(0, minEach));
  });

  // fill the rest randomly
  const flat = shuffle(allBanks.flat());
  for(const q of flat){
    if(selected.length >= total) break;
    if(!selected.includes(q)) selected.push(q);
  }

  return shuffle(selected).slice(0, total);
}





/* ===== Animated Background Script (Local Images) ===== */

// Put your local images in the same folder as index.html
const backgrounds = [
  "bg1.jpeg",
  "bg2.jpeg",
  "bg3.jpeg",
  "bg4.jpeg",
  "bg5.jpeg"
];

// Preload images for smooth transitions
backgrounds.forEach(src => {
  const img = new Image();
  img.src = src;
});

let bgIndex = 0;
let showFirst = true;

const bg1 = document.getElementById("bg1");
const bg2 = document.getElementById("bg2");

function switchBackground() {
  const next = backgrounds[bgIndex % backgrounds.length];
  bgIndex++;

  const incoming = showFirst ? bg1 : bg2;
  const outgoing = showFirst ? bg2 : bg1;

  incoming.style.backgroundImage = `url(${next})`;
  incoming.style.opacity = 1;
  incoming.style.transform = "scale(1)";

  outgoing.style.opacity = 0;
  outgoing.style.transform = "scale(1.05)";

  showFirst = !showFirst;
}

// Initialize first background
switchBackground();

// Change background every 10 seconds
setInterval(switchBackground, 10000);


/* ===== Question Logic (unchanged) ===== */
let i=0, answers=[], time=1020, half=time/2, halfWarned=false;

const qno = document.getElementById("qno"),
      qtext = document.getElementById("qtext"),
      A = document.getElementById("A"),
      B = document.getElementById("B"),
      C = document.getElementById("C"),
      D = document.getElementById("D"),
      timer = document.getElementById("timer"),
      result = document.getElementById("result"),
      prev = document.getElementById("prev"),
      next = document.getElementById("next");

function load() {
  const q = questions[i];
  qno.innerText = `Question ${i+1} of ${questions.length}`;
  qtext.innerText = q.q;
  A.innerText = q.options.A;
  B.innerText = q.options.B;
  C.innerText = q.options.C;
  D.innerText = q.options.D;

  document.querySelectorAll("input[name='opt']").forEach(r => r.checked = answers[i]===r.value);
  prev.disabled = i===0;
  next.disabled = i===questions.length-1;
}

function selected() {
  let v;
  document.querySelectorAll("input[name='opt']").forEach(r=>{ if(r.checked) v=r.value; });
  return v;
}

prev.onclick = () => { if(selected()) answers[i]=selected(); if(i>0){ i--; load(); } };
next.onclick = () => { if(selected()) answers[i]=selected(); if(i<questions.length-1){ i++; load(); } };

document.getElementById("submit").onclick = () => {
  let score = 0;
  let html = `<h3>Score: `;
  questions.forEach((q,idx) => { if(answers[idx]===q.ans) score++; });
  html += `${score} / ${questions.length}</h3>`;
  questions.forEach((q,idx)=>{
    const ua = answers[idx] || "None";
    html += `<div class="review">
      <b>Q${idx+1}:</b> ${q.q}<br>
      Your Answer: <span style="color:${ua===q.ans?'lightgreen':'salmon'}">${ua}</span><br>
      Correct: <span style="color:lightgreen">${q.ans}</span><br>
      <b>Explanation:</b> ${q.exp}</div>`;
  });
  result.innerHTML = html;
  result.classList.remove("hidden");
};

/* ===== Timer with yellow/red warning ===== */
function startTimer(){
  const t = setInterval(() => {
    if(time <= 0){
      timer.innerText = "0:00";
      clearInterval(t);
      document.getElementById("submit").click();
      return;
    }
    time--;
    let m = Math.floor(time/60), s = time%60;
    timer.innerText = `${m}:${s<10?'0':''}${s}`;

    if(time===half && !halfWarned){
      timer.classList.add("yellow");
      setTimeout(()=> timer.classList.remove("yellow"), 1200);
      halfWarned = true;
    }
    if(time <= 15) timer.classList.add("red");
  }, 1000);
}

/* ===== Go-To Function ===== */
function goTo() {
  const n = parseInt(document.getElementById("gotoInput").value);
  if(n>=1 && n<=questions.length){
    i = n-1;
    load();
  }
}

/* ===== Calculator ===== */
let calcValue = "";

function press(val){
  if(calcValue === "0") calcValue = "";
  calcValue += val;
  document.getElementById("calcScreen").innerText = calcValue;
}
function clearCalc(){
  calcValue = "";
  document.getElementById("calcScreen").innerText = "0";
}
function calculate(){
  try{
    calcValue = eval(calcValue).toString();
    document.getElementById("calcScreen").innerText = calcValue;
  } catch {
    document.getElementById("calcScreen").innerText = "Error";
    calcValue = "";
  }
}
function openCalc(){ document.getElementById("calcModal").classList.remove("hidden"); }
function closeCalc(){ document.getElementById("calcModal").classList.add("hidden"); }

/* ===== Initialize ===== */
loadQuestions();
</script>
</body>
</html>
